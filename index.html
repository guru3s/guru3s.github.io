<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agentic AI Pain Radar</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8faf9;
      --ink: #141414;
      --muted: #5f666d;
      --line: #d8dee4;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-2: #9a3412;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    main { max-width: 860px; margin: 0 auto; padding: 54px 24px; }
    h1 { font-size: clamp(34px, 6vw, 62px); line-height: .98; margin: 0 0 12px; letter-spacing: 0; }
    p { color: var(--muted); max-width: 700px; font-size: 18px; }
    .latest {
      display: inline-block;
      margin-top: 18px;
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      font-weight: 800;
    }
    ul { list-style: none; padding: 0; margin: 30px 0 0; display: grid; gap: 10px; }
    a {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px 16px;
      color: var(--ink);
      text-decoration: none;
    }
    a:hover { border-color: var(--accent); box-shadow: 0 10px 30px rgba(20,20,20,.08); }
    .kicker { color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 12px; letter-spacing: .08em; }
  </style>
</head>
<body>
  <main>
    <div class="kicker">Agentic AI Pain Radar</div>
    <h1>Published Reports</h1>
    <p>Daily evidence boards of real production complaints around AI agents, model deployment, spend, governance, RAG, evals, and observability.</p>
